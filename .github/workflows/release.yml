name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: amd64
          - runner: macos-latest
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: go tool install
        run: go install tool

      - name: Regenerate build assets (version from release tag)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go tool wails3 update build-assets \
            -name desk-squat-tracker \
            -binaryname desk-squat-tracker \
            -config build/config.yml \
            -dir build \
            -productversion "$VERSION"

      - name: Package macOS .app
        run: go tool wails3 task darwin:package

      - name: Create archive and checksums
        id: bundle
        run: |
          VERSION="${{ github.ref_name }}"
          ZIP="desk-squat-tracker-${VERSION}-macos-${{ matrix.arch }}.zip"
          ditto -c -k --keepParent "bin/desk-squat-tracker.app" "$ZIP"
          shasum -a 256 "$ZIP" | tee "${ZIP}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos-${{ matrix.arch }}
          path: |
            desk-squat-tracker-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip
            desk-squat-tracker-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip.sha256

  publish-release:
    needs: [macos-app]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            release-assets/*.zip
            release-assets/*.sha256
          generate_release_notes: true
